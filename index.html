<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Growth">
<meta name="theme-color" content="#3C3489">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Growth System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-text" id="sidebar-app-name">Growth System</span>
      <span class="logo-sub">Personal Growth Tracker</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <button class="nav-item active" data-page="dashboard" onclick="goTo('dashboard', true)">
        <span class="nav-icon">📊</span> Dashboard
      </button>
      <button class="nav-item" data-page="jadwal" onclick="goTo('jadwal', true)">
        <span class="nav-icon">🕐</span> Jadwal Hari Ini
      </button>

      <div class="nav-section-label" style="margin-top:8px">Harian</div>
      <button class="nav-item" data-page="habit" onclick="goTo('habit', true)">
        <span class="nav-icon">✅</span> Habit Harian
      </button>
      <button class="nav-item" data-page="review" onclick="goTo('review', true)">
        <span class="nav-icon">📋</span> Weekly Review
      </button>

      <div class="nav-section-label" style="margin-top:8px">Belajar & Karir</div>
      <button class="nav-item" data-page="belajar" onclick="goTo('belajar', true)">
        <span class="nav-icon">📚</span> Progress Belajar
      </button>
      <button class="nav-item" data-page="catatan" onclick="goTo('catatan', true)">
        <span class="nav-icon">📝</span> Catatan Belajar
      </button>
      <button class="nav-item" data-page="jurnal" onclick="goTo('jurnal', true)">
        <span class="nav-icon">📖</span> Jurnal Karir
      </button>

      <div class="nav-section-label" style="margin-top:8px">Proyek & Target</div>
      <button class="nav-item" data-page="proyek" onclick="goTo('proyek', true)">
        <span class="nav-icon">💼</span> Portofolio & Proyek
      </button>
      <button class="nav-item" data-page="milestone" onclick="goTo('milestone', true)">
        <span class="nav-icon">🎯</span> Target & Milestone
      </button>
    </nav>
    <div class="sidebar-bottom">
      <button class="nav-item" data-page="settings" onclick="goTo('settings', true)">
        <span class="nav-icon">⚙️</span> Pengaturan
      </button>
    </div>
  </aside>

  <!-- SIDEBAR OVERLAY (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- MAIN -->
  <div class="main-content">

    <!-- MOBILE TOPBAR -->
    <div class="mobile-topbar">
      <button class="hamburger" onclick="openSidebar()">☰</button>
      <span id="mobile-app-name" style="font-family:var(--font-serif);font-size:16px">Growth System</span>
      <span id="mobile-page-title" style="font-size:13px;color:var(--text2);margin-left:auto"></span>
    </div>

    <!-- DESKTOP TOPBAR -->
    <div class="topbar">
      <span class="topbar-title" id="topbar-title">Dashboard</span>
      <div class="topbar-search" id="topbar-search-wrap" style="display:none">
        <span style="color:var(--text3)">🔍</span>
        <input type="text" placeholder="Cari di halaman ini..." id="topbar-search-input" oninput="handleTopbarSearch(this.value)">
      </div>
    </div>

    <!-- PAGES -->
    <div id="page-dashboard" class="page active"></div>
    <div id="page-jadwal" class="page"></div>
    <div id="page-habit" class="page"></div>
    <div id="page-belajar" class="page"></div>
    <div id="page-review" class="page"></div>
    <div id="page-proyek" class="page"></div>
    <div id="page-catatan" class="page"></div>
    <div id="page-jurnal" class="page"></div>
    <div id="page-milestone" class="page"></div>
    <div id="page-settings" class="page"></div>

  </div>
</div>

<script src="app.js"></script>
<script>
function handleTopbarSearch(q) {
  const page = state.page;
  const listRenders = { catatan: renderCatatanList, jurnal: renderJurnalList, proyek: renderProyekList };
  if (listRenders[page]) {
    state.searchQuery[page] = q;
    const inlineInput = document.getElementById(page + '-search');
    if (inlineInput && document.activeElement !== inlineInput) inlineInput.value = q;
    listRenders[page]();
  }
}

// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
